<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Opening Remira…</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/png" href="/remira-favicon.png" />

    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #0b0f1a;
        color: #e8edf7;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        gap: 20px;
      }
      .logo { width: 64px; height: 64px; border-radius: 16px; }
      .spinner {
        width: 28px; height: 28px;
        border: 3px solid rgba(255,255,255,0.2);
        border-top-color: #2563eb;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      h1 { font-size: 20px; font-weight: 600; margin: 0; }
      p { font-size: 15px; color: #9aa6bd; margin: 0; max-width: 320px; line-height: 1.5; }
      a.btn {
        display: inline-block;
        margin-top: 4px;
        padding: 12px 22px;
        background: #2563eb;
        color: #fff;
        text-decoration: none;
        border-radius: 999px;
        font-weight: 600;
        font-size: 15px;
      }

      /* In-app browser (TikTok / Instagram / etc.) instructions — hidden by default. */
      #inapp { display: none; }
      #inapp .card {
        background: #131a2b;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 16px;
        padding: 22px 20px;
        max-width: 360px;
        width: 100%;
        text-align: left;
      }
      #inapp .card h2 {
        font-size: 17px;
        font-weight: 600;
        margin: 0 0 14px;
        text-align: center;
      }
      #inapp .steps {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      #inapp .steps li {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        font-size: 15px;
        line-height: 1.45;
        color: #d6deee;
      }
      #inapp .num {
        flex: 0 0 26px;
        height: 26px;
        border-radius: 50%;
        background: #2563eb;
        color: #fff;
        font-size: 14px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #inapp .dots {
        font-weight: 700;
        letter-spacing: 1px;
        background: rgba(255,255,255,0.12);
        padding: 1px 8px;
        border-radius: 6px;
      }
      #inapp .hint {
        margin: 16px auto 0;
        font-size: 13px;
        color: #7d8aa3;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <img class="logo" src="/remira-favicon.png" alt="Remira" />

    <!-- Default view: shown in real browsers while we redirect to the App Store. -->
    <div id="redirecting">
      <div class="spinner" aria-hidden="true" style="margin: 0 auto 16px;"></div>
      <h1>Taking you to the App Store…</h1>
      <p>If you're not redirected automatically, tap the button below.</p>
      <a class="btn" id="store-link" href="https://apps.apple.com/us/app/remira-ai/id6759989867" style="margin-top: 16px;">Open in the App Store</a>
    </div>

    <!-- In-app browser view: TikTok blocks the App Store, so guide users out first. -->
    <div id="inapp">
      <h1 style="margin-bottom: 4px;">Almost there!</h1>
      <div class="card">
        <ol class="steps">
          <li><span class="num">1</span><span>Tap the <span class="dots">• • •</span> menu in the top-right corner.</span></li>
          <li><span class="num">2</span><span>Tap <strong>“Open in Browser,”</strong> then hit the App Store button below.</span></li>
        </ol>
      </div>
      <a class="btn" href="https://apps.apple.com/us/app/remira-ai/id6759989867" style="margin-top: 20px;">Open in the App Store</a>
    </div>

    <script>
      (function () {
        var APP_STORE_URL = "https://apps.apple.com/us/app/remira-ai/id6759989867";
        // itms-apps:// opens the native App Store app directly (no Safari hand-off step).
        var ITMS_URL = "itms-apps://apps.apple.com/us/app/remira-ai/id6759989867";

        var ua = navigator.userAgent || "";
        var isIOS = /iPad|iPhone|iPod/.test(ua) ||
                    (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

        // Detect in-app browsers (web views) that block the App Store hand-off.
        // TikTok: "BytedanceWebview"/"musical_ly"/"Bytedance"/"trill". We also catch
        // Instagram/Facebook web views since they have the same limitation.
        var isInApp = /BytedanceWebview|musical_ly|Bytedance|trill|TikTok|Instagram|FBAN|FBAV|FB_IAB/i.test(ua);

        if (isInApp) {
          // Don't auto-redirect — it just gets blocked. Show the "open in browser" steps.
          document.getElementById("redirecting").style.display = "none";
          document.getElementById("inapp").style.display = "block";
          return;
        }

        // Real browser: redirect straight to the App Store.
        // On iOS, try the itms-apps scheme first, then fall back to the https URL,
        // which iOS also routes to the App Store and every other platform opens normally.
        if (isIOS) {
          try { window.location.replace(ITMS_URL); } catch (e) {}
          setTimeout(function () {
            window.location.replace(APP_STORE_URL);
          }, 350);
        } else {
          window.location.replace(APP_STORE_URL);
        }
      })();
    </script>
  </body>
</html>
